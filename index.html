<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petopia Hub | Book Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hub-container">
        <header>
            <h1>Petopia Hub</h1>
            <p>Where Pets Find Paradise</p>
        </header>

        <div class="form-group">
            <label>Pet Name</label>
            <input type="text" id="petName" placeholder="tomy">
        </div>
        <button class="btn-main" onclick="createHub()">Launch Hub</button>

        <div id="passport">
            <span class="status">● Active</span>
            <h2 id="resName">Name</h2>
            <div class="tip-box" id="dailyTip">Tip: Regular checkups keep Tomy happy!</div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <h3>📅 Book an Appointment</h3>
            <div class="service-list">
                <div class="service-item">
                    <span><strong>Paradise Vet Clinic</strong> (Open)</span>
                    <button class="book-btn" onclick="bookAppointment('Paradise Vet')">Book Now</button>
                </div>
                <div class="service-item">
                    <span><strong>Bubbles Grooming</strong> (Open)</span>
                    <button class="book-btn" onclick="bookAppointment('Bubbles Grooming')">Book Now</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
