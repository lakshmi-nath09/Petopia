<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petopia Hub | Smart Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hub-container">
        <header>
            <h1>Petopia Hub</h1>
            <p>Your Pet’s Digital Universe</p>
        </header>

        <div class="form-group">
            <label>Pet Name</label>
            <input type="text" id="petName" placeholder="tomy">
        </div>

        <button class="btn-main" onclick="createHub()">Launch Hub</button>

        <div id="passport">
            <span class="status">● Active</span>
            <h2 id="resName" style="margin:0;">Name</h2>
            
            <div id="booking-section">
                <h3>📅 Schedule Appointment</h3>
                <div class="form-group">
                    <label>Select Date</label>
                    <input type="date" id="bookDate">
                </div>
                <div class="form-group">
                    <label>Select Time</label>
                    <select id="bookTime">
                        <option>09:00 AM</option>
                        <option>11:00 AM</option>
                        <option>02:00 PM</option>
                        <option>04:00 PM</option>
                    </select>
                </div>
                <button class="book-btn" onclick="bookAppointment('Paradise Vet')">Book with Paradise Vet</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
